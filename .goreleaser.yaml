version: 2

project_name: git-auto-sync

before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - binary: git-auto-sync
    id: git-auto-sync
    env:
      - CGO_ENABLED=0
      - RELEASE=true
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm
      - arm64

  - binary: git-auto-sync-daemon
    id: git-auto-sync-daemon
    dir: daemon
    env:
      - CGO_ENABLED=0
      - RELEASE=true
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm
      - arm64

  # Macos build needs to be built on macos
  # https://github.com/rjeczalik/notify/issues/177
  - binary: git-auto-sync
    id: git-auto-sync-macos
    env:
      - CGO_ENABLED=1
      - CC=clang
      - CXX=clang++
      - RELEASE=true
    ldflags:
      - -s -w
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

  - binary: git-auto-sync-daemon
    id: git-auto-sync-daemon-macos
    dir: daemon
    env:
      - CGO_ENABLED=1
      - CC=clang
      - CXX=clang++
      - RELEASE=true
    ldflags:
      - -s -w
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  # Windows ships as zip; Linux/macOS as tar.gz.
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: |-
      {{- .ProjectName -}}_
      {{- .Version -}}_
      {{- title .Os -}}_
      {{- if eq .Arch "amd64" -}}x86_64
      {{- else if eq .Arch "386" -}}i386
      {{- else -}}{{ .Arch }}{{- end -}}
      {{- with .Arm -}}v{{ . }}{{- end -}}
    files:
      - LICENSE
      - README.md
      - README_zh.md
      - completions/bash_autocomplete
      - completions/zsh_autocomplete
      - completions/powershell_autocomplete.ps1
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
